version: "3.8"

services:
  gas-price-scraper:
    build: .
    container_name: gas-price-scraper
    restart: unless-stopped
    ports:
      - "8211:8080"
    environment:
      - TZ=Europe/Zurich
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")' || exit 1" ]
      interval: 300s
      timeout: 30s
      retries: 3
      start_period: 30s
